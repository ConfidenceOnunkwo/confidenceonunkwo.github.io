<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js"></script>
</head>
<body>
    <!--NAVIGATION-->
    <div class="header">
        <div class="brand">
            <img class="logo" src="pictures/official.jpeg" alt="Confidence Onunkwo">
            <h2 class="portfolio">PORTFOLIO</h2>
        </div>
        <nav>
            <ul class="nav-menu">
                <li class="home"><a href="index.html">Home</a></li>
                <li class="resume"><a href="resume.html">Resume</a></li>
                <li class="Projects"><a href="project.html">Projects</a></li>
                <li class="contact"><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </div>

    <!--BODY-->
    <div class="project-container">
        <div class="project-header">Get In Touch</div>
        
        <div class="project-card">
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject:</label>
                    <input type="text" id="subject" name="subject" placeholder="Subject (5-50 characters)" required>
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" placeholder="Enter your message (10-500 characters)" required></textarea>
                    <div id="charCount">0 / 500 characters</div>
                </div>

                <div class="project-buttons">
                    <button type="submit" class="nextBtn">Submit Message</button>
                </div>
            </form>
        </div>
        
        <div id="successMessage"></div>
    </div>

    <!--FOOTER-->
    <footer class="footer">
        <div class="footer-links">
            <a href="https://github.com/ConfidenceOnunkwo">GitHub</a>
            <a href="https://www.linkedin.com/in/confidence-onunkwo-a126151b7">LinkedIn</a>
            <a href="mailto:onun0003@algonquinlive.com">Email</a>
        </div>

        <p>Copyright © 2026 Chiamaka Confidence Onunkwo. All rights reserved.</p>
    </footer>
</body>
</html>
